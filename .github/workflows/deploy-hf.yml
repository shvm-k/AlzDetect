name: Deploy to Hugging Face Space

# Auto-syncs this repo to a Hugging Face Space on every push to the branch.
# One-time setup (see deploy/DEPLOY.md):
#   1. Create an empty Docker Space at huggingface.co/new-space
#   2. In this GitHub repo: Settings -> Secrets and variables -> Actions, add:
#        HF_TOKEN     = a Hugging Face token with "write" scope
#        HF_USERNAME  = your Hugging Face username
#        HF_SPACE     = the Space name (e.g. AlzDetect)

on:
  push:
    branches:
      - claude/upbeat-newton-f7gyub
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          set -e
          # The Space's README.md must carry HF frontmatter.
          cp deploy/huggingface-space-README.md README.md
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add README.md
          git commit -m "Sync to Hugging Face Space" || echo "nothing to commit"
          git push --force \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}" \
            HEAD:main
